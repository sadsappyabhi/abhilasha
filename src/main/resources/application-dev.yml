spring:
  thymeleaf:
    cache: false
  devtools:
    restart:
      enabled: true
    LiveReload:
      enabled: true
  datasource:
    url: jdbc:h2:file:./data/testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true