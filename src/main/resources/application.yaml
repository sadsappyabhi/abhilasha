spring:
  application:
    name: Abhilasha Chebolu Figueroa
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
  datasource:
#    url: jdbc:h2:file:./data/testdb
#    username: sa
#    password:
#    driver-class-name: org.h2.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:abhilasha}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
server:
  port: 8080
