spring:
  application:
    name: Abhilasha Chebolu Figueroa
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  devtools:
    LiveReload:
      enabled: true
    restart:
      enabled: true
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:file:./data/testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
server:
  port: 8080
