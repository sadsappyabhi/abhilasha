spring:
  thymeleaf:
    cache: true
  devtools:
    restart:
      enabled: false
  h2:
    console:
      enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:abhilasha}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:abhilasha}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    baseline-on-migrate: true